name: Deploy Pages

# Builds and deploys the docs/ static frontend to GitHub Pages. The site runs
# the real jit accounting/legal/algorithms engines client-side via Pyodide
# (Python compiled to WebAssembly) — no server, so this workflow is the only
# "backend" the app needs: it vendors the Pyodide runtime and syncs the
# pure-Python jit source into docs/ at build time, then publishes docs/ as-is.
#
# Deploys by force-pushing the built docs/ to a gh-pages branch (plain git),
# not via the newer Pages Deployments API (actions/configure-pages +
# actions/deploy-pages). That API had a sustained outage the first time this
# was set up, and its failure mode is opaque (a bare "no server available"
# from a health-check call this workflow doesn't otherwise need). Pushing to
# a branch is the older, plainer mechanism GitHub Pages has supported for
# years and has no dependency on that API at all.
#
# One-time repo setting this requires: Settings -> Pages -> Build and
# deployment -> Source: "Deploy from a branch" -> Branch: gh-pages, folder /.
on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "docs/**"
      - "jit/**"
      - "scripts/sync_pyodide_source.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (for vendoring the Pyodide npm package)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vendor the Pyodide runtime into docs/vendor/pyodide
        run: |
          set -euo pipefail
          mkdir -p docs/vendor/pyodide
          npm install --no-save pyodide@0.26.4
          cp node_modules/pyodide/pyodide.mjs \
             node_modules/pyodide/pyodide.asm.js \
             node_modules/pyodide/pyodide.asm.wasm \
             node_modules/pyodide/pyodide-lock.json \
             node_modules/pyodide/python_stdlib.zip \
             docs/vendor/pyodide/

      - name: Sync the jit engine source for the browser
        run: bash scripts/sync_pyodide_source.sh

      - name: Deploy docs/ to the gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
